name: Publish to TestPyPI

# Fires when you push a pre-release tag (e.g. v1.2.3a1, v1.2.3b2, v1.2.3rc1)
# or when you manually trigger via workflow_dispatch.
#
# Prerequisites on TestPyPI (one-time manual setup):
#   - Log in to https://test.pypi.org
#   - Go to "Your projects" → "Publishing" → "Add a new pending publisher"
#   - Provider:       GitHub
#   - Owner:          techgniouss
#   - Repository:     pocket-desk-agent
#   - Workflow name:  publish.yml
#   - Environment:    testpypi

on:
  push:
    tags:
      - "v*a*"    # alpha:   v1.2.3a1
      - "v*b*"    # beta:    v1.2.3b2
      - "v*rc*"   # rc:      v1.2.3rc1
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Git tag version:     $TAG"
          echo "pyproject version:   $PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://test.pypi.org/project/pocket-desk-agent/
    permissions:
      id-token: write  # Required for Trusted Publishing (OIDC)
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
