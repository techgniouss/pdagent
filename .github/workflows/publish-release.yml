name: Publish to PyPI

# Fires when you manually publish a GitHub Release. The flow is:
#   1. You push a stable tag (vX.Y.Z) from your machine.
#   2. You visit GitHub → Releases → Draft a new release → select the tag → Publish.
#   3. This workflow runs on release:published, builds the sdist+wheel, and
#      uploads them to PyPI using Trusted Publishing (OIDC, no long-lived token).
#
# Prerequisites on PyPI (one-time manual setup):
#   - Log in to https://pypi.org
#   - Go to "Your projects" → "Publishing" → "Add a new pending publisher"
#     (or edit an existing project's publishing settings after the first upload)
#   - Provider:       GitHub
#   - Owner:          techgniouss
#   - Repository:     pocket-desk-agent
#   - Workflow name:  publish-release.yml
#   - Environment:    pypi

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Git tag version:     $TAG"
          echo "pyproject version:   $PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pocket-desk-agent/
    permissions:
      id-token: write  # Required for Trusted Publishing (OIDC)
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
